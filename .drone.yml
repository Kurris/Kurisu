kind: pipeline
type: docker
name: default

steps:
  - name: debug-network
    image: alpine
    environment:
      HTTP_PROXY: http://192.168.101.59:7897
      HTTPS_PROXY: http://192.168.101.59:7897
    commands:
      - echo "=== 环境变量 ==="
      - env | grep -i proxy
      - echo "=== 测试直接连接代理端口 ==="
      - wget -qO- http://192.168.101.59:7897 || echo "直接连接失败"
      - echo "=== 通过代理访问外网 ==="
      - wget -qO- https://github.com || echo "代理访问失败"
